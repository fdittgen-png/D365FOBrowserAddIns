name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and draft release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify version consistency
        run: |
          TAG="${GITHUB_REF##*/}"
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          MANIFEST_VERSION=$(node -p "require('./public/manifest.json').version")
          echo "tag=$TAG_VERSION pkg=$PKG_VERSION manifest=$MANIFEST_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Version mismatch between tag, package.json, and manifest.json" >&2
            exit 1
          fi

      - name: Package builds
        id: package
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          mkdir -p artifacts
          (cd dist && zip -qr "../artifacts/d365fo-browser-addins-${VERSION}-chrome.zip" .)
          (cd dist && zip -qr "../artifacts/d365fo-browser-addins-${VERSION}-edge.zip" .)
          cd artifacts
          sha256sum *.zip > SHA256SUMS
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            BEGIN { capture = 0 }
            /^## \[/ {
              if (capture == 1) exit
              if ($0 ~ "\\[" ver "\\]") { capture = 1; next }
            }
            capture == 1 { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No matching CHANGELOG.md section for $VERSION — drafting with placeholder" >&2
            echo "Release ${VERSION}" > release-notes.md
          fi
          echo "notes-file=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2.6.1
        with:
          draft: true
          name: v${{ steps.package.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            artifacts/*.zip
            artifacts/SHA256SUMS
