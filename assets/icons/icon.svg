<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="D365FO Repro Recorder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="22" ry="22" fill="url(#bg)" />
  <!-- Recording dot -->
  <circle cx="40" cy="64" r="16" fill="#ef4444" />
  <!-- Play/forward chevrons representing a recorded path -->
  <path d="M68 44 L94 64 L68 84 Z" fill="#ffffff" opacity="0.9" />
  <!-- Stroke for definition -->
  <rect x="4" y="4" width="120" height="120" rx="22" ry="22" fill="none" stroke="#0b1a4a" stroke-width="2" stroke-opacity="0.15" />
</svg>
